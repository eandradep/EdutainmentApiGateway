version: '3.1'

services:
  #Billin app backend service
  api-gateway-server:
    container_name: api-gateway-server
    build:
      context: ./
      args:
        - JAR_FILE=./target/api-gateway-server.jar
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "650M"
        reservations:
          cpus: "1.5"
          memory: "150M"
    environment:
      - JAVA_OPTS=
        -Xms256M
        -Xmx256M
    ports:
      - "8090:8090"
    networks:
      - edutainment-network
    restart: always


networks:
  edutainment-network:
    external: true

# End